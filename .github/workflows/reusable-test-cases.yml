name: Reusable Test Cases Runtime Setup + Built-in Cache

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  Run_Test_Cases:
    runs-on: ubuntu-latest
    env:
      SERVICE_PATH: ${{ inputs.service == 'cart_service' && 'src/cart_service' || format('src/{0}', inputs.service) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        if: contains(fromJson('["frontend","checkout_service","shipping_service","product_catalog_service"]'), inputs.service)
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            ${{ env.SERVICE_PATH }}/go.sum

      - name: Setup Node
        if: contains(fromJson('["payment_service","currency_service"]'), inputs.service)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Setup Python
        if: contains(fromJson('["recommendation_service","email_service"]'), inputs.service)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        if: inputs.service == 'ad_service'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Dotnet
        if: inputs.service == 'cart_service'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache Python Dependencies
        if: contains(fromJson('["recommendation_service","email_service"]'), inputs.service)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/requirements.txt', env.SERVICE_PATH)) }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Dotnet Packages
        if: inputs.service == 'cart_service'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles(format('{0}/**/*.csproj', env.SERVICE_PATH)) }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Go Dependencies
        if: contains(fromJson('["frontend","checkout_service","shipping_service","product_catalog_service"]'), inputs.service)
        working-directory: ${{ env.SERVICE_PATH }}
        run: go mod download

      - name: Node Dependencies
        if: contains(fromJson('["payment_service","currency_service"]'), inputs.service)
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm ci

      - name: Python Dependencies
        if: contains(fromJson('["recommendation_service","email_service"]'), inputs.service)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          pip install -r requirements.txt

      - name: Java Dependencies
        if: inputs.service == 'ad_service'
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          chmod +x gradlew
          ./gradlew dependencies

      - name: Dotnet Restore
        if: inputs.service == 'cart_service'
        working-directory: ${{ env.SERVICE_PATH }}/src
        run: dotnet restore

      ########################################################
      # Go Test Cases
      - name: Run Go Test Cases
        if: contains(fromJson('["frontend","checkout_service","shipping_service","product_catalog_service"]'), inputs.service)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go test -v -coverprofile=coverage.out ./... | tee test-output.txt

      - name: Go Coverage Summary
        if: contains(fromJson('["frontend","checkout_service","shipping_service","product_catalog_service"]'), inputs.service)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt

      - name: Generate Go HTML Coverage Report
        if: contains(fromJson('["frontend","checkout_service","shipping_service","product_catalog_service"]'), inputs.service)
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload Go Coverage Report
        if: contains(fromJson('["frontend","checkout_service","shipping_service","product_catalog_service"]'), inputs.service)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service }}-coverage-report
          path: ${{ env.SERVICE_PATH }}/coverage.html

      # Dotnet Test Cases
      - name: Run Dotnet Test Cases
        if: inputs.service == 'cart_service'
        working-directory: ${{ env.SERVICE_PATH }}/tests
        run: |
          dotnet test --collect:"XPlat Code Coverage" | tee dotnet-test-output.txt

      - name: Upload Dotnet Coverage
        if: inputs.service == 'cart_service'
        uses: actions/upload-artifact@v4
        with:
          name: cart_service-coverage
          path: |
            src/cart_service/tests/**/coverage.cobertura.xml

      - name: Install ReportGenerator
        if: inputs.service == 'cart_service'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML Coverage Report
        if: inputs.service == 'cart_service'
        working-directory: ${{ env.SERVICE_PATH }}/tests
        run: |
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:Html

      - name: Upload HTML Coverage Report
        if: inputs.service == 'cart_service'
        uses: actions/upload-artifact@v4
        with:
          name: cart_service-html-report
          path: src/cart_service/tests/coverage-report
