name: PR Validation

on:
  pull_request:
    branches:
      - develop

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  security-events: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: set-matrix
        run: ./scripts/detect_changed_services.sh

#   service-lint:
#     needs: detect-changes
#     if: needs.detect-changes.outputs.matrix != '[]'
#     strategy:
#       fail-fast: false
#       matrix:
#         service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
#     uses: ./.github/workflows/reusable-lint.yml
#     with:
#       service: ${{ matrix.service }}
#
  service-test-cases:
    #needs: [service-lint,detect-changes]
    needs: [detect-changes]
    if: needs.detect-changes.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-test-cases.yml
    with:
      service: ${{ matrix.service }}
#
#   service-sonar-scan:
#     needs: [detect-changes,service-test-cases]
#     if: needs.detect-changes.outputs.matrix != '[]'
#     strategy:
#       fail-fast: false
#       matrix:
#         service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
#     uses: ./.github/workflows/reusable-sonar-scan.yml
#     secrets: inherit
#     with:
#       service: ${{ matrix.service }}

  service-build:
    #needs: [detect-changes,service-sonar-scan]
    needs: [detect-changes]
    if: needs.detect-changes.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      service: ${{ matrix.service }}
      repo_name: gnishanth777/online_boutique

  compose-validation:
    needs: [detect-changes,service-build]
    uses: ./.github/workflows/docker-compose-integration.yml
    secrets: inherit
    with:
      compose_file: compose/docker-compose-integration-dev.yml
      repo_name: gnishanth777/online_boutique
      changed_services: ${{ needs.detect-changes.outputs.matrix }}
