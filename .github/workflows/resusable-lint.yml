name: Reusable Lint Workflow

on:
    workflow_call:
        inputs:
            service:
                required: true
                type: string

jobs:
    lint:
        runs-on: ubunut-lates
        env:
          SERVICE_PATH: ${{ inputs.service == 'cartservice' && 'src/cartservice/src' || format('src/{0}', inputs.service) }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            # Go Lint
            - name: Setup Go
              if: contains(fromJson('["frontend","checkoutservice","shippingservice","productcatalogservice"]'), inputs.service)
              uses: actions/setup-go@v5
              with:
                go-version: '1.25'

            - name: Install GolangCI-Lint
              if: contains(fromJson('["frontend","checkoutservice","shippingservice","productcatalogservice"]'), inputs.service)
              run: |
                curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
                | sh -s -- -b $(go env GOPATH)/bin latest

            - name: Run Go Lint
              if: contains(fromJson('["frontend","checkoutservice","shippingservice","productcatalogservice"]'), inputs.service)
              working-directory: ${{ env.SERVICE_PATH }}
              run: |
                golangci-lint run ./...

            # Nodejs Lint
            - name: Setup Node
              if: contains(fromJson('["paymentservice","currencyservice"]'), inputs.service)
              uses: actions/setup-node@v4
              with:
                node-version: '20'

            - name: Install Node Dependencies
              if: contains(fromJson('["paymentservice","currencyservice"]'), inputs.service)
              working-directory: ${{ env.SERVICE_PATH }}
              run: npm install

            - name: Run Node Lint
              if: contains(fromJson('["paymentservice","currencyservice"]'), inputs.service)
              working-directory: ${{ env.SERVICE_PATH }}
              run: npm run lint
            # Python Lint

            - name: Setup Python
              if: contains(fromJson('["recommendationservice","emailservice"]'), inputs.service)
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: Install Python Lint Tools
              if: contains(fromJson('["recommendationservice","emailservice"]'), inputs.service)
              run: |
                pip install flake8 black

            - name: Install Python Dependencies
              if: contains(fromJson('["recommendationservice","emailservice"]'), inputs.service)
              working-directory: ${{ env.SERVICE_PATH }}
              run: pip install -r requirements.txt

            - name: Run Python Lint
              if: contains(fromJson('["recommendationservice","emailservice"]'), inputs.service)
              working-directory: ${{ env.SERVICE_PATH }}
              run: |
                flake8 .
                black --check .

            # Dotnet Lint
            - name: Setup Dotnet
              if: inputs.service == 'cartservice'
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '8.0.x'

            - name: Run Dotnet Format Check
              if: inputs.service == 'cartservice'
              working-directory: ${{ env.SERVICE_PATH }}
              run: |
                dotnet format --verify-no-changes


