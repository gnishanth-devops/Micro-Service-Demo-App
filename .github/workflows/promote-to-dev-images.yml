name: Promote to Dev Images

on:
  push:
    branches:
      - develop

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          SERVICES=$(echo "$CHANGED" | grep '^src/' | cut -d/ -f2 | sort -u | jq -R -s -c '
            split("\n")
            | map(select(length > 0))
          ')
          echo "Detected services: $SERVICES"
          echo "matrix=$SERVICES" >> $GITHUB_OUTPUT

  promote-dev:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    permissions:
      packages: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download Promotion Metadata
        uses: actions/download-artifact@v4
        with:
          name: promotion-metadata-${{ matrix.service }}
          path: promotion

      - name: Read SHA
        run: |
          SHA=$(cat promotion/${{ matrix.service }}.sha)
          echo "SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Pull SHA Image
        run: |
          docker pull \
            docker.io/${{ secrets.DOCKER_USERNAME }}/online_boutique:${{ matrix.service }}-sha-${SHORT_SHA}

      - name: Promote Dev Tag
        run: |
          docker tag \
            docker.io/${{ secrets.DOCKER_USERNAME }}/online_boutique:${{ matrix.service }}-sha-${SHORT_SHA} \
            docker.io/${{ secrets.DOCKER_USERNAME }}/online_boutique:${{ matrix.service }}-dev

      - name: Push Dev Tag
        run: |
          docker push \
            docker.io/${{ secrets.DOCKER_USERNAME }}/online_boutique:${{ matrix.service }}-dev
