name: Promote to Dev Images

on:
  push:
    branches:
      - develop
env:
  BUCKET_NAME: "github-actions-test-gnishanth"
  AWS_REGION: "us-east-1"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          SERVICES=$(echo "$CHANGED" | grep '^src/' | cut -d/ -f2 | sort -u | jq -R -s -c '
            split("\n")
            | map(select(length > 0))
          ')
          echo "Detected services: $SERVICES"
          echo "matrix=$SERVICES" >> $GITHUB_OUTPUT

  promote-dev:
    needs: detect-changes
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::719640820386:role/github-actions-role
          role-session-name: githubactions
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Promotion Metadata
        run: |
          aws s3 cp \
            s3://${{ env.BUCKET_NAME }}/promotion/${{ matrix.service }}/latest.json \
            promotion.json

      - name: Read Promotion Metadata
        run: |
          SHA=$(jq -r '.sha' promotion.json)
          IMAGE=$(jq -r '.image' promotion.json)
          echo "SHA=$SHA" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          cat promotion.json

      - name: Pull SHA Image
        run: |
          docker pull ${IMAGE}

      - name: Promote Dev Image
        run: |
          docker tag \
            ${IMAGE} \
            docker.io/${{ secrets.DOCKER_USERNAME }}/online_boutique:${{ matrix.service }}-dev
          docker push \
            docker.io/${{ secrets.DOCKER_USERNAME }}/online_boutique:${{ matrix.service }}-dev
