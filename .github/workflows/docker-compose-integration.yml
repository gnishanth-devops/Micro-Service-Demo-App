name: Compose Integration Workflow

on:
  workflow_call:
    inputs:
      compose_file:
        required: true
        type: string

jobs:
  compose-integration:
    runs-on: ubuntu-latest

    timeout-minutes: 30

    permissions:
      contents: read
      packages: read

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Generate Compose Environment File
      - name: Generate Compose Environment File
        run: |
          cat <<EOF > compose/.env.ci
          FRONTEND_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/frontend:frontend-pr-${{ github.event.number }}
          PRODUCTCATALOGSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/productcatalogservice:productcatalogservice-pr-${{ github.event.number }}
          CARTSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/cartservice:cartservice-pr-${{ github.event.number }}
          RECOMMENDATIONSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/recommendationservice:recommendationservice-pr-${{ github.event.number }}
          CURRENCYSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/currencyservice:currencyservice-pr-${{ github.event.number }}
          CHECKOUTSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/checkoutservice:checkoutservice-pr-${{ github.event.number }}
          PAYMENTSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/paymentservice:paymentservice-pr-${{ github.event.number }}
          SHIPPINGSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/shippingservice:shippingservice-pr-${{ github.event.number }}
          EMAILSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/emailservice:emailservice-pr-${{ github.event.number }}
          ADSERVICE_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/adservice:adservice-pr-${{ github.event.number }}
          EOF

      # Pull Candidate Images
      - name: Pull Candidate Images
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            pull

      # Start Ephemeral Integration Environment
      - name: Start Compose Environment
        run: |
          docker compose --env-file compose/.env.ci -f ${{ inputs.compose_file }} up -d --wait

      # Show Running Containers
      - name: Show Compose Status
        run: docker compose --env-file compose/.env.ci -f ${{ inputs.compose_file }} ps

      # install jq tool
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Wait For Frontend
      - name: Wait For Frontend
        run: |
          chmod +x scripts/wait-for-stack.sh
          ./scripts/wait-for-stack.sh

      # Run Integration Tests
      - name: Run Integration Tests
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh

      # Run Smoke Tests
      - name: Run Smoke Tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      # Collect Logs On Failure
      - name: Collect Compose Logs
        if: failure()
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            logs

      # Destroy Ephemeral Environment
      - name: Cleanup Compose Environment
        if: always()
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            down -v
