name: Compose Integration Workflow

on:
  workflow_call:
    inputs:
      compose_file:
        required: true
        type: string
      image_name:
        required: true
        type: string
      changed_services:
        required: true
        type: string

jobs:
  compose-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v6

      # Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # - name: Generate Compose Environment File
      #   run: |
      #     cat <<EOF > compose/.env.ci
      #     FRONTEND_IMAGE=docker.io/${{ inputs.image_name }}:frontend-pr-${{ github.event.number }}
      #     PRODUCTCATALOGSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:product_catalog_service-pr-${{ github.event.number }}
      #     CARTSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:cart_service-pr-${{ github.event.number }}
      #     RECOMMENDATIONSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:recommendation_service-pr-${{ github.event.number }}
      #     CURRENCYSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:currency_service-pr-${{ github.event.number }}
      #     CHECKOUTSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:checkout_service-pr-${{ github.event.number }}
      #     PAYMENTSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:payment_service-pr-${{ github.event.number }}
      #     SHIPPINGSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:shipping_service-pr-${{ github.event.number }}
      #     EMAILSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:email_service-pr-${{ github.event.number }}
      #     ADSERVICE_IMAGE=docker.io/${{ inputs.image_name }}:ad_service-pr-${{ github.event.number }}
      #     EOF

      - name: Generate Compose Environment File
        env:
          CHANGED_SERVICES: ${{ inputs.changed_services }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          SERVICES=(
            frontend
            product_catalog_service
            cart_service
            recommendation_service
            currency_service
            checkout_service
            payment_service
            shipping_service
            email_service
            ad_service
          )
          > compose/.env.ci
          for SERVICE in "${SERVICES[@]}"; do
            if echo "$CHANGED_SERVICES" | jq -r '.[]' | grep -qx "$SERVICE"; then
              TAG="${SERVICE}-sha-${SHORT_SHA}"
            else
              TAG="${SERVICE}-dev"
            fi
            ENV_NAME=$(echo "${SERVICE}_IMAGE" | tr '[:lower:]' '[:upper:]')
            echo "${ENV_NAME}=docker.io/${{ inputs.image_name }}:${TAG}" >> compose/.env.ci
          done
          cat compose/.env.ci

      # Pull Candidate Images
      - name: Pull Candidate Images
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            pull

      # Start Ephemeral Integration Environment
      - name: Start Compose Environment
        run: |
          docker compose --env-file compose/.env.ci -f ${{ inputs.compose_file }} up -d --wait

      # Show Running Containers
      - name: Show Compose Status
        run: docker compose --env-file compose/.env.ci -f ${{ inputs.compose_file }} ps

      # Run Integration Tests
      - name: Run Integration Tests
        run: |
          chmod +x scripts/integration-test.sh
          ./scripts/integration-test.sh

      # Run Smoke Tests
      - name: Run Smoke Tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      # Collect Logs On Failure
      - name: Collect Compose Logs
        if: failure()
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            logs

      # Destroy Ephemeral Environments
      - name: Cleanup Compose Environment
        if: always()
        run: |
          docker compose \
            --env-file compose/.env.ci \
            -f ${{ inputs.compose_file }} \
            down -v
